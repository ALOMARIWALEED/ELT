<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة تعلم - Learn</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --navy: #0a1628;
      --navy-light: #1a2744;
      --navy-mid: #243352;
      --navy-soft: #2d3f5e;
      --gold: #c8a415;
      --gold-light: #e8d44d;
      --gold-dark: #9a7d0f;
      --gold-glow: rgba(200, 164, 21, 0.12);
      --surface: #f4f6fa;
      --card: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --success: #059669;
      --success-bg: #d1fae5;
      --danger: #dc2626;
      --danger-bg: #fee2e2;
      --warning: #d97706;
      --warning-bg: #fef3c7;
      --info: #0284c7;
      --info-bg: #dbeafe;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(10, 22, 40, 0.06);
      --shadow-md: 0 8px 30px rgba(10, 22, 40, 0.1);
      --shadow-lg: 0 20px 60px rgba(10, 22, 40, 0.15);
      --ease: cubic-bezier(0.23, 1, 0.32, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--surface);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--navy) 0%, #0f1f3d 50%, var(--navy-light) 100%);
      position: relative;
      padding: 20px;
    }

    .login-screen::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(200,164,21,0.08), transparent 70%);
      top: -150px;
      right: -150px;
      border-radius: 50%;
    }

    .login-screen::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(200,164,21,0.05), transparent 70%);
      bottom: -100px;
      left: -100px;
      border-radius: 50%;
    }

    .login-top-actions {
      position: absolute;
      top: 24px;
      left: 24px;
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    .login-top-actions .btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      backdrop-filter: blur(10px);
    }
    
    .login-top-actions .btn:hover { background: rgba(255, 255, 255, 0.2); }

    .login-card {
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.25);
      text-align: center;
      position: relative;
      z-index: 1;
      animation: cardAppear 0.6s var(--ease);
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--navy), var(--navy-light));
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 1.8rem;
      color: var(--gold);
      box-shadow: 0 8px 24px rgba(10, 22, 40, 0.3);
    }

    .login-title { font-size: 1.5rem; font-weight: 800; color: var(--navy); margin-bottom: 6px; }
    .login-subtitle { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 32px; }

    .role-selector { display: flex; justify-content: center; margin-bottom: 28px; }
    .role-btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s var(--ease);
      background: var(--navy);
      color: #fff;
      box-shadow: 0 4px 12px rgba(10, 22, 40, 0.2);
    }

    .back-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.3s;
    }
    .back-btn:hover { color: var(--navy); }

    .form-group { margin-bottom: 18px; text-align: right; }
    .form-label { display: block; font-weight: 700; font-size: 0.85rem; color: var(--navy); margin-bottom: 7px; }
    .form-control {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 11px;
      font-family: inherit;
      font-size: 0.92rem;
      transition: all 0.3s var(--ease);
      background: #f8fafc;
      color: var(--text);
    }
    .form-control:focus { outline: none; border-color: var(--gold); background: #fff; box-shadow: 0 0 0 4px var(--gold-glow); }
    .form-control::placeholder { color: #94a3b8; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 13px 28px; border-radius: 11px; font-weight: 700; font-size: 0.9rem;
      cursor: pointer; transition: all 0.3s var(--ease); border: none; font-family: inherit; white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy); box-shadow: 0 4px 15px rgba(200, 164, 21, 0.25); }
    .btn-primary:hover { box-shadow: 0 8px 25px rgba(200, 164, 21, 0.35); transform: translateY(-1px); }
    .btn-secondary { background: var(--navy); color: #fff; }
    .btn-secondary:hover { background: var(--navy-light); }
    .btn-outline { background: transparent; border: 2px solid #e2e8f0; color: var(--text); }
    .btn-outline:hover { border-color: var(--navy); background: #f8fafc; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-sm { padding: 9px 16px; font-size: 0.8rem; border-radius: 8px; }
    .btn-block { width: 100%; }

    .app-layout { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px; background: linear-gradient(180deg, var(--navy) 0%, var(--navy-light) 100%);
      position: fixed; right: 0; top: 0; height: 100vh; z-index: 100; display: flex; flex-direction: column;
      border-left: 1px solid rgba(255,255,255,0.04); transition: all 0.4s var(--ease);
    }
    .sidebar-header { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .sidebar-brand { display: flex; align-items: center; gap: 12px; }
    .sidebar-brand-icon {
      width: 40px; height: 40px; background: var(--gold-glow); border: 2px solid var(--gold); border-radius: 10px;
      display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 1.1rem;
    }
    .sidebar-brand-text h2 { color: #fff; font-size: 1.05rem; font-weight: 800; line-height: 1.2; }
    .sidebar-brand-text span { color: var(--gold); font-size: 0.7rem; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
    .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
    .nav-section-title { color: rgba(255,255,255,0.3); font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 12px 14px 8px; margin-top: 8px; }
    .nav-item {
      display: flex; align-items: center; gap: 11px; padding: 12px 14px; border-radius: 10px;
      color: rgba(255,255,255,0.55); cursor: pointer; transition: all 0.3s var(--ease); margin-bottom: 3px; font-weight: 600; font-size: 0.88rem; position: relative;
    }
    .nav-item::before {
      content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%) scaleY(0);
      width: 3px; height: 60%; background: var(--gold); border-radius: 0 3px 3px 0; transition: all 0.3s var(--ease);
    }
    .nav-item:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: var(--gold); background: var(--gold-glow); }
    .nav-item.active::before { transform: translateY(-50%) scaleY(1); }
    .nav-item i { width: 20px; text-align: center; font-size: 1rem; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.06); }
    .user-card { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: var(--gold-glow); border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center; color: var(--gold); font-weight: 800; font-size: 0.85rem;
    }
    .user-card-info span { display: block; }
    .user-card-info .user-name { color: #fff; font-weight: 700; font-size: 0.85rem; }
    .user-card-info .user-role { color: var(--gold); font-size: 0.72rem; font-weight: 600; }

    .main-area { flex: 1; margin-right: 260px; padding: 28px; min-height: 100vh; transition: all 0.4s var(--ease); }
    .page-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 28px; flex-wrap: wrap; gap: 15px; }
    .page-title { font-size: 1.6rem; font-weight: 800; color: var(--navy); }
    .page-desc { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.04); transition: all 0.3s var(--ease); overflow: hidden; }
    .card:hover { box-shadow: var(--shadow-md); }
    .card-header { padding: 16px 22px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
    .card-header h3 { font-size: 0.95rem; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 8px; }
    .card-body { padding: 22px; }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-box { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.03); position: relative; overflow: hidden; transition: all 0.3s var(--ease); }
    .stat-box::after { content: ''; position: absolute; bottom: 0; right: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); opacity: 0; transition: opacity 0.3s; }
    .stat-box:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .stat-box:hover::after { opacity: 1; }
    .stat-box .stat-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; margin-bottom: 14px; }
    .stat-box .stat-num { font-size: 1.9rem; font-weight: 900; color: var(--navy); line-height: 1; margin-bottom: 4px; }
    .stat-box .stat-text { color: var(--text-muted); font-size: 0.8rem; font-weight: 600; }

    .table-wrap { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .data-table thead th { background: var(--navy); color: #fff; padding: 13px 16px; font-weight: 700; font-size: 0.82rem; text-align: right; white-space: nowrap; }
    .data-table thead th:first-child { border-radius: 0 10px 0 0; }
    .data-table thead th:last-child { border-radius: 10px 0 0 0; }
    .data-table tbody td { padding: 12px 16px; border-bottom: 1px solid #f1f5f9; font-size: 0.87rem; vertical-align: middle; }
    .data-table tbody tr { transition: background 0.2s; }
    .data-table tbody tr:hover { background: #f8fafc; }

    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; }
    .badge-success { background: var(--success-bg); color: #065f46; }
    .badge-danger { background: var(--danger-bg); color: #991b1b; }
    .badge-warning { background: var(--warning-bg); color: #92400e; }
    .badge-info { background: var(--info-bg); color: #1e40af; }
    .badge-navy { background: rgba(10,22,40,0.08); color: var(--navy); }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10, 22, 40, 0.5); backdrop-filter: blur(3px); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: #fff; border-radius: 20px; padding: 32px; width: 100%; max-width: 500px; box-shadow: var(--shadow-lg); animation: modalIn 0.4s var(--ease); max-height: 90vh; overflow-y: auto; }
    @keyframes modalIn { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: none; } }
    .modal-title { font-size: 1.2rem; font-weight: 800; color: var(--navy); margin-bottom: 22px; display: flex; align-items: center; gap: 10px; }
    .modal-title i { color: var(--gold); }

    .toast-wrap { position: fixed; top: 24px; left: 24px; z-index: 3000; display: flex; flex-direction: column; gap: 10px; }
    .toast-msg { padding: 14px 22px; border-radius: 11px; color: #fff; font-weight: 600; font-size: 0.88rem; box-shadow: var(--shadow-md); animation: toastIn 0.4s var(--ease); display: flex; align-items: center; gap: 10px; }
    .toast-msg.success { background: var(--success); }
    .toast-msg.error { background: var(--danger); }
    .toast-msg.warning { background: var(--warning); }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: none; } }

    .exam-wrapper { max-width: 780px; margin: 0 auto; }
    .exam-header { background: var(--navy); color: #fff; padding: 18px 28px; border-radius: var(--radius) var(--radius) 0 0; display: flex; justify-content: space-between; align-items: center; }
    .exam-timer-box { background: var(--danger); padding: 7px 18px; border-radius: 24px; font-weight: 800; font-size: 1.2rem; letter-spacing: 1.5px; }
    .exam-body { background: #fff; padding: 28px; border: 1px solid #e2e8f0; border-top: none; }
    .exam-footer { background: #f8fafc; padding: 18px 28px; border: 1px solid #e2e8f0; border-top: none; border-radius: 0 0 var(--radius) var(--radius); display: flex; justify-content: space-between; align-items: center; }
    .q-text { font-size: 1.05rem; font-weight: 600; color: var(--navy); margin-bottom: 22px; direction: ltr; text-align: left; line-height: 1.9; }
    .opt-item { display: flex; align-items: center; gap: 12px; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 11px; margin-bottom: 10px; cursor: pointer; transition: all 0.25s var(--ease); direction: ltr; text-align: left; }
    .opt-item:hover { border-color: var(--gold); background: var(--gold-glow); }
    .opt-item.picked { border-color: var(--gold); background: var(--gold-glow); }
    .opt-letter { width: 30px; height: 30px; border-radius: 50%; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.82rem; color: var(--navy); flex-shrink: 0; }
    .q-nav-grid { display: flex; flex-wrap: wrap; gap: 6px; padding: 16px 28px; background: #fff; border: 1px solid #e2e8f0; border-top: none; }
    .q-dot { width: 32px; height: 32px; border-radius: 7px; border: 2px solid #e2e8f0; background: #fff; cursor: pointer; font-weight: 700; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .q-dot.done { background: var(--gold-glow); border-color: var(--gold); color: var(--gold); }
    .q-dot.now { background: var(--navy); color: #fff; border-color: var(--navy); }

    .chart-box { position: relative; height: 280px; width: 100%; }
    .ring-wrap { width: 110px; height: 110px; position: relative; margin: 0 auto; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-val { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 900; color: var(--navy); }

    @media (max-width: 992px) {
      .sidebar { width: 64px; }
      .sidebar .nav-item span, .sidebar-brand-text, .nav-section-title, .user-card-info, .sidebar-footer .btn span { display: none; }
      .sidebar-header { padding: 16px 12px; }
      .sidebar-brand-icon { margin: 0 auto; }
      .nav-item { justify-content: center; padding: 12px; }
      .user-card { justify-content: center; }
      .main-area { margin-right: 64px; }
    }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-area { margin-right: 0; padding: 16px; padding-bottom: 80px; }
      .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; }
      .page-top { flex-direction: column; }
      .mobile-bar { display: flex !important; }
    }

    .mobile-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--navy); padding: 8px 0; z-index: 100; justify-content: space-around; border-top: 2px solid rgba(200,164,21,0.3); }
    .mob-item { display: flex; flex-direction: column; align-items: center; gap: 3px; color: rgba(255,255,255,0.4); font-size: 0.65rem; cursor: pointer; padding: 6px 10px; border-radius: 8px; transition: all 0.2s; font-weight: 600; }
    .mob-item.active { color: var(--gold); }
    .mob-item i { font-size: 1.1rem; }

    .hidden { display: none !important; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    .student-stat-card { text-align: center; padding: 24px; }
    .student-stat-card .big-num { font-size: 2.5rem; font-weight: 900; color: var(--navy); line-height: 1; }
    .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
    .empty-state i { font-size: 3rem; color: #cbd5e1; margin-bottom: 15px; }
    .empty-state p { font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<div id="loginScreen" class="login-screen">
  <div class="login-top-actions">
    <button class="btn btn-sm" onclick="switchLoginRole('admin')"><i class="fa-solid fa-shield-halved"></i> دخول الإدارة</button>
    <button class="btn btn-sm" onclick="switchLoginRole('teacher')"><i class="fa-solid fa-chalkboard-user"></i> دخول المعلم</button>
  </div>

  <div class="login-card">
    <div class="login-logo"><i class="fa-solid fa-graduation-cap"></i></div>
    <h2 class="login-title" id="loginMainTitle">منصة تعلم</h2>
    <p class="login-subtitle">Learn Platform - نظام التدريب اللغوي المتقدم</p>

    <div id="loginFormStudent">
      <div class="role-selector">
        <button class="role-btn"><i class="fa-solid fa-user-graduate"></i> تسجيل دخول المتدرب</button>
      </div>
      <div class="form-group">
        <label class="form-label">الرقم العسكري</label>
        <input type="text" class="form-control" id="loginMilId" placeholder="أدخل الرقم العسكري">
      </div>
      <button class="btn btn-primary btn-block" onclick="doStudentLogin()"><i class="fa-solid fa-right-to-bracket"></i> دخول</button>
    </div>

    <div id="loginFormAdmin" class="hidden">
      <button class="back-btn" onclick="switchLoginRole('student')"><i class="fa-solid fa-arrow-right"></i> عودة للمتدرب</button>
      <div class="form-group">
        <label class="form-label">اسم المستخدم</label>
        <input type="text" class="form-control" id="loginUsername" placeholder="أدخل اسم المستخدم">
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input type="password" class="form-control" id="loginPassword" placeholder="أدخل كلمة المرور">
      </div>
      <button class="btn btn-primary btn-block" onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول</button>
    </div>

    <div id="loginError" class="hidden" style="margin-top:16px; padding:12px; background:var(--danger-bg); border-radius:9px; color:#991b1b; font-size:0.83rem; text-align:center;">
      <i class="fa-solid fa-circle-exclamation"></i> <span id="loginErrorText">بيانات الدخول غير صحيحة</span>
    </div>
  </div>
</div>

<div id="appMain" class="hidden">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <div class="sidebar-brand-icon"><i class="fa-solid fa-graduation-cap"></i></div>
          <div class="sidebar-brand-text">
            <h2>تعلم</h2>
            <span>Learn Platform</span>
          </div>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar" id="sideAvatar">م</div>
          <div class="user-card-info">
            <span class="user-name" id="sideName">المستخدم</span>
            <span class="user-role" id="sideRole">مدير</span>
          </div>

function switchLoginRole(role) {
  loginRole = role;
  const title = document.getElementById('loginMainTitle');
  if(role === 'admin') title.innerHTML = 'دخول الإدارة';
  else if(role === 'teacher') title.innerHTML = 'دخول المعلم';
  else title.innerHTML = 'منصة تعلم';
  document.getElementById('loginFormAdmin').classList.toggle('hidden', role === 'student');
  document.getElementById('loginFormStudent').classList.toggle('hidden', role !== 'student');
  document.getElementById('loginError').classList.add('hidden');
}

function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  if (!username || !password) { showLoginError('الرجاء تعبئة جميع الحقول'); return; }
  const ref = loginRole === 'admin' ? 'learn_admins' : 'learn_teachers';
  db.ref(ref).once('value', snap => {
    const data = snap.val();
    if (!data) { showLoginError('بيانات الدخول غير صحيحة'); return; }
    const found = Object.values(data).find(u => u.username === username && u.password === password);
    if (found) { currentUser = { ...found, role: loginRole }; enterApp(); } 
    else { showLoginError('اسم المستخدم أو كلمة المرور غير صحيحة'); }
  });
}

function doStudentLogin() {
  const milId = document.getElementById('loginMilId').value.trim();
  if (!milId) { showLoginError('الرجاء إدخال الرقم العسكري'); return; }
  db.ref('learn_students').once('value', snap => {
    const data = snap.val();
    if (!data) { showLoginError('الرقم العسكري غير مسجل'); return; }
    const entry = Object.entries(data).find(([k,v]) => v.milId === milId);
    if (entry) { currentUser = { id: entry[0], ...entry[1], role: 'student' }; enterApp(); } 
    else { showLoginError('الرقم العسكري غير مسجل في النظام'); }
  });
}

function showLoginError(msg) {
  document.getElementById('loginErrorText').textContent = msg;
  document.getElementById('loginError').classList.remove('hidden');
  setTimeout(() => document.getElementById('loginError').classList.add('hidden'), 4000);
}

function enterApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appMain').classList.remove('hidden');
  document.getElementById('sideName').textContent = currentUser.name || currentUser.username;
  document.getElementById('sideRole').textContent = currentUser.role === 'admin' ? 'إدارة' : currentUser.role === 'teacher' ? 'المعلم' : 'متدرب';
  document.getElementById('sideAvatar').textContent = (currentUser.name || currentUser.username || 'م').charAt(0);
  buildSidebar();
  loadAllData();
  goTo(currentUser.role === 'student' ? 'myDash' : 'dashboard');
}

function doLogout() {
  currentUser = null;
  document.getElementById('appMain').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginUsername').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginMilId').value = '';
  switchLoginRole('student');
}

      { id:'reports', icon:'fa-file-pdf', label:'التقارير' }

  } else {
    items = [
      { id:'myDash', icon:'fa-grid-2', label:'لوحتي' },

  items.forEach((item, i) => {
    if (item.section) html += `<div class="nav-section-title">${item.section}</div>`;

function renderDashboard(el) {
  const total = students.length;
  const avg = total > 0 ? Math.round(students.reduce((a,s) => a + (s.mockScore||0), 0) / total) : 0;
  const passed = students.filter(s => (s.mockScore||0) >= (s.target||60)).length;
  const passRate = total > 0 ? Math.round(passed/total*100) : 0;
  const mri = Math.round((passRate + avg) / 2);
  el.innerHTML = `
    <div class="page-top"><div><h1 class="page-title">لوحة التحكم</h1><p class="page-desc">نظرة عامة على أداء المتدربين</p></div><button class="btn btn-primary" onclick="goTo('exams')"><i class="fa-solid fa-play"></i> بدء اختبار جديد</button></div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-icon" style="background:var(--info-bg); color:var(--info);"><i class="fa-solid fa-users"></i></div><div class="stat-num">${total}</div><div class="stat-text">إجمالي المتدربين</div></div>
      <div class="stat-box"><div class="stat-icon" style="background:var(--success-bg); color:var(--success);"><i class="fa-solid fa-chart-simple"></i></div><div class="stat-num">${avg}</div><div class="stat-text">متوسط الدرجات</div></div>
      <div class="stat-box"><div class="stat-icon" style="background:var(--warning-bg); color:var(--warning);"><i class="fa-solid fa-bullseye"></i></div><div class="stat-num">${passRate}%</div><div class="stat-text">نسبة النجاح</div></div>
      <div class="stat-box"><div class="stat-icon" style="background:rgba(200,164,21,0.1); color:var(--gold);"><i class="fa-solid fa-shield-halved"></i></div><div class="stat-num">${mri}</div><div class="stat-text">مؤشر الجاهزية (MRI)</div></div>
    </div>
    <div class="grid-2">
      <div class="card"><div class="card-header"><h3><i class="fa-solid fa-chart-area"></i> تطور الأداء</h3></div><div class="card-body"><div class="chart-box"><canvas id="chartPerf"></canvas></div></div></div>
      <div class="card"><div class="card-header"><h3><i class="fa-solid fa-chart-pie"></i> توزيع نقاط الضعف</h3></div><div class="card-body"><div class="chart-box"><canvas id="chartSkills"></canvas></div></div></div>
    </div>
  `;
  setTimeout(() => { initPerfChart(); initSkillChart(); }, 100);
}

function initPerfChart() {
  const ctx = document.getElementById('chartPerf'); if (!ctx) return;
  const labels = students.slice(-12).map(s => s.name || 'متدرب');
  const data = students.slice(-12).map(s => s.mockScore || 0);
  new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: 'الدرجة', data, borderColor: '#c8a415', backgroundColor: 'rgba(200,164,21,0.08)', fill: true, tension: 0.4, pointBackgroundColor: '#c8a415', pointRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 100 } } } });
}
function initSkillChart() {
  const ctx = document.getElementById('chartSkills'); if (!ctx) return;
  const sk = { Grammar:0, Listening:0, Vocabulary:0, Reading:0 };
  students.forEach(s => { if (s.weakness && sk[s.weakness] !== undefined) sk[s.weakness]++; });
  new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(sk), datasets: [{ data: Object.values(sk), backgroundColor: ['#c8a415','#0284c7','#059669','#dc2626'], borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } } });
}

let xlData = [];
// ===== التعديل 2: قراءة عمود الشرح من الإكسل =====
function readExcel(e) {
  const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
  reader.onload = function(ev) {
    const wb = XLSX.read(ev.target.result, { type: 'binary' });
    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    xlData = data.map(r => ({
      questionText: r['Question']||r['question']||'',
      optionA: r['A']||r['Option A']||'',
      optionB: r['B']||r['Option B']||'',
      optionC: r['C']||r['Option C']||'',
      optionD: r['D']||r['Option D']||'',
      correctAnswer: r['Correct Answer']||r['Answer']||'',
      skill: r['Skill']||r['skill']||'Grammar',
      difficulty: r['Difficulty']||r['difficulty']||'Medium',
      explanation: r['Explanation']||r['explanation']||r['شرح']||''
    }));
    const prev = document.getElementById('xlPreview'); prev.classList.remove('hidden');
    prev.innerHTML = `<h4 style="font-weight:700; margin-bottom:12px;">معاينة (${xlData.length} سؤال)</h4><div class="table-wrap" style="max-height:300px; overflow-y:auto;"><table class="data-table"><thead><tr><th>السؤال</th><th>A</th><th>B</th><th>C</th><th>D</th><th>الإجابة</th><th>الشرح</th></tr></thead><tbody>${xlData.slice(0,15).map(q=>`<tr><td style="direction:ltr;text-align:left;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${q.questionText}</td><td style="direction:ltr;">${q.optionA}</td><td style="direction:ltr;">${q.optionB}</td><td style="direction:ltr;">${q.optionC}</td><td style="direction:ltr;">${q.optionD}</td><td><strong>${q.correctAnswer}</strong></td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${q.explanation}</td></tr>`).join('')}</tbody></table></div><button class="btn btn-primary" style="margin-top:14px;" onclick="doImport()"><i class="fa-solid fa-check"></i> تأكيد الاستيراد (${xlData.length} سؤال)</button>`;
    toast(`تم قراءة ${xlData.length} سؤال`, 'success');
  };
  reader.readAsBinaryString(file);
}

function doImport() {
  if (!xlData.length) return; const updates = {};
  xlData.forEach(q => { updates[db.ref('learn_questions').push().key] = { ...q, createdAt: Date.now() }; });
  db.ref('learn_questions').update(updates).then(() => { toast(`تم استيراد ${xlData.length} سؤال بنجاح!`, 'success'); xlData = []; goTo('questions'); });
}

function setupDrop() {
  const area = document.getElementById('dropArea'); if (!area) return;
  area.addEventListener('dragover', e => { e.preventDefault(); area.style.borderColor='var(--gold)'; area.style.background='var(--gold-glow)'; });
  area.addEventListener('dragleave', () => { area.style.borderColor='#cbd5e1'; area.style.background=''; });
  area.addEventListener('drop', e => { e.preventDefault(); area.style.borderColor='#cbd5e1'; area.style.background=''; const f = e.dataTransfer.files[0]; if (f) { const dt = new DataTransfer(); dt.items.add(f); document.getElementById('xlFile').files = dt.files; readExcel({target:document.getElementById('xlFile')}); } });
}

function beginExam() {
  if (questions.length < 5) { toast('بنك الأسئلة يحتاج 5 أسئلة على الأقل', 'warning'); return; }
  examQs = [...questions].sort(() => 0.5 - Math.random()).slice(0, Math.min(50, questions.length));
  examIdx = 0; examAnswers = {};
  const area = document.getElementById('examArea');
  area.innerHTML = `
    <div class="exam-wrapper" style="margin-top:20px;">
      <div class="exam-header"><div><strong>اختبار ALCPT</strong><div style="font-size:0.78rem; opacity:0.7; margin-top:3px;">السؤال <span id="eqNum">1</span> من ${examQs.length}</div></div><div class="exam-timer-box" id="eTimer">30:00</div></div>
      <div style="padding:0 28px; background:#fff; border:1px solid #e2e8f0; border-top:none;"><div style="height:5px; background:#e2e8f0; border-radius:3px; margin:12px 0;"><div id="eBar" style="height:100%; background:var(--gold); border-radius:3px; width:2%; transition:width 0.4s;"></div></div></div>
      <div class="exam-body" id="eBody"></div>
      <div class="q-nav-grid" id="eNav"></div>
      <div class="exam-footer"><button class="btn btn-outline btn-sm" onclick="examPrev()"><i class="fa-solid fa-arrow-right"></i> السابق</button><button class="btn btn-primary btn-sm" id="eNextBtn" onclick="examNext()">التالي <i class="fa-solid fa-arrow-left"></i></button></div>
    </div>
  `;
  if (area.previousElementSibling) area.previousElementSibling.style.display = 'none';
  showExamQ(); buildExamNav(); startExamTimer(30*60);
}

function showExamQ() {
  const q = examQs[examIdx];
  document.getElementById('eqNum').textContent = examIdx+1;
  document.getElementById('eBar').style.width = ((examIdx+1)/examQs.length*100)+'%';
  const opts = [ {l:'A', t:q.optionA||q.A||''}, {l:'B', t:q.optionB||q.B||''}, {l:'C', t:q.optionC||q.C||''}, {l:'D', t:q.optionD||q.D||''} ];
  document.getElementById('eBody').innerHTML = `<div style="display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px; background:var(--gold-glow); color:var(--gold); border-radius:50%; font-weight:800; margin-bottom:14px;">${examIdx+1}</div><div class="q-text">${q.questionText||q.Question||''}</div>${opts.map(o => `<div class="opt-item ${examAnswers[examIdx]===o.l?'picked':''}" onclick="pickAnswer('${o.l}')"><div class="opt-letter">${o.l}</div><span>${o.t}</span></div>`).join('')}`;
  document.getElementById('eNextBtn').innerHTML = examIdx===examQs.length-1 ? '<i class="fa-solid fa-flag-checkered"></i> إنهاء' : 'التالي <i class="fa-solid fa-arrow-left"></i>';
  buildExamNav();
}

function pickAnswer(l) { examAnswers[examIdx] = l; showExamQ(); }
function examNext() { if (examIdx === examQs.length-1) endExam(); else { examIdx++; showExamQ(); } }
function examPrev() { if (examIdx > 0) { examIdx--; showExamQ(); } }
function buildExamNav() { document.getElementById('eNav').innerHTML = examQs.map((_,i) => { let c = ''; if (i===examIdx) c='now'; else if (examAnswers[i]) c='done'; return `<button class="q-dot ${c}" onclick="examIdx=${i}; showExamQ();">${i+1}</button>`; }).join(''); }
function startExamTimer(sec) { let rem = sec; examTimer = setInterval(() => { rem--; const m = Math.floor(rem/60), s = rem%60; const el = document.getElementById('eTimer'); if (el) el.textContent = `${m}:${s<10?'0':''}${s}`; if (rem <= 0) { clearInterval(examTimer); endExam(); } }, 1000); }

// ===== التعديل 3: تعديل شاشة نهاية الاختبار وإضافة زر المراجعة =====
function endExam() {
  clearInterval(examTimer);
  let correct = 0;
  examQs.forEach((q,i) => { if (examAnswers[i] === (q.correctAnswer||q['Correct Answer'])) correct++; });
  const score = Math.round(correct/examQs.length*100);
  const pass = score >= 60;

  db.ref('learn_results').push({ studentId: currentUser.milId||currentUser.username, studentName: currentUser.name||'', score, correct, total: examQs.length, timestamp: Date.now() });
  if (currentUser.role === 'student' && currentUser.id) {
    db.ref('learn_students/' + currentUser.id + '/mockScore').set(score);
    currentUser.mockScore = score;
  }

  document.getElementById('examArea').innerHTML = `
    <div class="card" style="text-align:center; padding:50px; margin-top:20px;">
      <i class="fa-solid fa-${pass?'trophy':'circle-exclamation'}" style="font-size:4rem; color:${pass?'var(--success)':'var(--danger)'}; margin-bottom:16px;"></i>
      <h2 style="font-weight:900; color:var(--navy); margin-bottom:8px;">${pass?'أحسنت! اجتزت الاختبار':'لم تجتز الاختبار'}</h2>
      <div style="font-size:3rem; font-weight:900; color:${pass?'var(--success)':'var(--danger)'}; margin:16px 0;">${score}%</div>
      <p style="color:var(--text-muted);">${correct} صحيحة من ${examQs.length}</p>
      
      <div style="display:flex; gap:10px; justify-content:center; margin-top:24px;">
        <button class="btn btn-success" onclick="renderExamReview()"><i class="fa-solid fa-list-check"></i> مراجعة الإجابات</button>
        <button class="btn btn-primary" onclick="goTo(currentUser.role==='student'?'myExam':'exams')"><i class="fa-solid fa-redo"></i> اختبار جديد</button>
      </div>
    </div>
  `;
}

// ===== التعديل 4: بناء صفحة مراجعة الإجابات (التغذية الراجعة) =====
function renderExamReview() {
  let html = `<div class="card" style="padding: 30px; margin-top: 20px;">
    <h3 style="margin-bottom: 20px; color: var(--navy); border-bottom: 2px solid #e2e8f0; padding-bottom: 15px;">
      <i class="fa-solid fa-list-check"></i> مراجعة إجابات الاختبار
    </h3>`;
  
  examQs.forEach((q, i) => {
    const uAns = examAnswers[i];
    const cAns = q.correctAnswer || q['Correct Answer'];
    const isCorrect = uAns === cAns;
    
    let optsHtml = ['A','B','C','D'].map(l => {
      let text = q['option'+l] || q[l] || '';
      let bg = '';
      let border = 'border: 2px solid #e2e8f0;';
      if (l === cAns) { 
        bg = 'background: var(--success-bg); color: var(--success); border-color: var(--success);'; 
      } else if (l === uAns && !isCorrect) { 
        bg = 'background: var(--danger-bg); color: var(--danger); border-color: var(--danger);'; 
      }
      
      return `<div style="padding: 10px; margin-bottom: 8px; border-radius: 8px; ${border} ${bg} direction:ltr; text-align:left;">
        <strong>${l}:</strong> ${text}
      </div>`;
    }).join('');

    html += `
      <div style="margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px dashed #e2e8f0;">
        <div style="display:flex; gap:10px; align-items:center; margin-bottom:15px;">
          <div style="width:30px; height:30px; border-radius:50%; background:${isCorrect?'var(--success)':'var(--danger)'}; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:bold;">${i+1}</div>
          <div class="q-text" style="margin:0;">${q.questionText || q.Question || ''}</div>
        </div>
        
        ${optsHtml}
        
        <div style="margin-top: 15px; padding: 15px; background: #f8fafc; border-right: 4px solid var(--info); border-radius: 8px;">
          <strong><i class="fa-solid fa-lightbulb" style="color:var(--gold);"></i> التغذية الراجعة (الشرح):</strong>
          <p style="margin-top: 8px; color: var(--text-muted); font-size: 0.95rem;">${q.explanation || 'لا يوجد شرح مضاف لهذا السؤال حتى الآن.'}</p>
        </div>
      </div>
    `;
  });

  html += `
    <div style="text-align:center; margin-top:20px;">
      <button class="btn btn-secondary" onclick="goTo(currentUser.role==='student'?'myDash':'dashboard')">
        <i class="fa-solid fa-home"></i> العودة للرئيسية
      </button>
    </div>
  </div>`;

  document.getElementById('examArea').innerHTML = html;
}

function saveTeacher() {
  const name = document.getElementById('tName').value.trim(); const username = document.getElementById('tUsername').value.trim(); const password = document.getElementById('tPassword').value.trim();
  if (!name || !username || !password) { toast('الرجاء تعبئة الحقول المطلوبة', 'error'); return; }
  db.ref('learn_teachers').push({ name, username, password, empId: document.getElementById('tEmpId').value.trim(), type: document.getElementById('tType').value, phone: document.getElementById('tPhone').value.trim(), createdAt: Date.now() }).then(() => { toast('تم إضافة المعلم بنجاح', 'success'); closeModal('modalAddTeacher'); clearInputs('tName','tEmpId','tPhone','tUsername','tPassword'); });
}

function saveAdmin() {
  const name = document.getElementById('aName').value.trim(); const username = document.getElementById('aUsername').value.trim(); const password = document.getElementById('aPassword').value.trim();
  if (!username || !password) { toast('الرجاء تعبئة الحقول المطلوبة', 'error'); return; }
  db.ref('learn_admins/' + username).set({ name: name||username, username, password, createdAt: Date.now() }).then(() => { toast('تم إضافة حساب الإدارة', 'success'); closeModal('modalAddAdmin'); clearInputs('aName','aUsername','aPassword'); });
}

function changePassword() {
  const old = document.getElementById('cpOld').value; const newP = document.getElementById('cpNew').value; const confirm = document.getElementById('cpConfirm').value;
  if (!old || !newP) { toast('الرجاء تعبئة جميع الحقول', 'error'); return; } if (newP !== confirm) { toast('كلمة المرور الجديدة غير متطابقة', 'error'); return; } if (old !== currentUser.password) { toast('كلمة المرور الحالية غير صحيحة', 'error'); return; }
  const ref = currentUser.role === 'admin' ? 'learn_admins' : 'learn_teachers';
  db.ref(ref).once('value', snap => { const data = snap.val(); const key = Object.keys(data).find(k => data[k].username === currentUser.username); if (key) { db.ref(`${ref}/${key}/password`).set(newP).then(() => { currentUser.password = newP; toast('تم تغيير كلمة المرور بنجاح', 'success'); closeModal('modalChangePass'); clearInputs('cpOld','cpNew','cpConfirm'); }); } });
}

function saveStudent() {
  const milId = document.getElementById('sNewMilId').value.trim(); const name = document.getElementById('sNewName').value.trim();
  if (!milId || !name) { toast('الرجاء تعبئة الحقول المطلوبة', 'error'); return; }
  db.ref('learn_students').push({ milId, name, mockScore: parseInt(document.getElementById('sNewScore').value)||0, target: parseInt(document.getElementById('sNewTarget').value)||60, weakness: document.getElementById('sNewWeak').value, createdAt: Date.now() }).then(() => { toast('تم إضافة المتدرب', 'success'); closeModal('modalAddStudent'); clearInputs('sNewMilId','sNewName','sNewScore'); });
}

// ===== التعديل 5: حفظ الشرح عند إضافة سؤال يدوياً =====
function saveQuestion() {
  const text = document.getElementById('qText').value.trim();
  if (!text) { toast('الرجاء إدخال نص السؤال', 'error'); return; }
  db.ref('learn_questions').push({
    questionText: text,
    optionA: document.getElementById('qA').value,
    optionB: document.getElementById('qB').value,
    optionC: document.getElementById('qC').value,
    optionD: document.getElementById('qD').value,
    correctAnswer: document.getElementById('qCorrect').value,
    skill: document.getElementById('qSkill').value,
    difficulty: document.getElementById('qDiff').value,
    explanation: document.getElementById('qExp').value.trim(), // حفظ الشرح
    createdAt: Date.now()
  }).then(() => { 
    toast('تم إضافة السؤال', 'success'); 
    closeModal('modalAddQuestion'); 
    clearInputs('qText','qA','qB','qC','qD','qExp'); // تنظيف حقل الشرح
  });
}

function deleteStudent(id) { if (confirm('حذف هذا المتدرب؟')) db.ref('learn_students/'+id).remove().then(()=>toast('تم الحذف','success')); }
function deleteTeacher(id) { if (confirm('حذف هذا المعلم؟')) db.ref('learn_teachers/'+id).remove().then(()=>toast('تم الحذف','success')); }
function deleteAdmin(id) { if (confirm('حذف هذا الحساب؟')) db.ref('learn_admins/'+id).remove().then(()=>toast('تم الحذف','success')); }
function deleteQuestion(id) { if (confirm('حذف هذا السؤال؟')) db.ref('learn_questions/'+id).remove().then(()=>toast('تم الحذف','success')); }

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function clearInputs(...ids) { ids.forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; }); }

function toast(msg, type='success') {
  const wrap = document.getElementById('toastWrap'); const t = document.createElement('div'); t.className = `toast-msg ${type}`; const icons = { success:'check-circle', error:'circle-xmark', warning:'triangle-exclamation' }; t.innerHTML = `<i class="fa-solid fa-${icons[type]||'info-circle'}"></i> ${msg}`; wrap.appendChild(t); setTimeout(() => t.remove(), 4000);
}
</script>
</body>
</html>
